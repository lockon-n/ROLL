custom_env:
  Minecraft:
    env_type: mcbots
    max_steps: 100
    max_tokens_per_step: 2048
    env_manager_cls: roll.pipeline.agentic.env_manager.mcbots_env_manager.McbotsEnvManager
    use_thread_lock: false
    env_config:
      tag: Minecraft
      # mcbots process management
      mcbots_project_root: ""  # Path to mcbots project (required for auto-start)
      mc_server_host: "127.0.0.1"
      mc_server_port: 25565
      render_mode: cpu
      client_health_check_timeout: 180
      agent_max_llm_successes: 0  # 0 = unlimited
