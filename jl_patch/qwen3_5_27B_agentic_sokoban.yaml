defaults:
  - ../examples/config/vl_traj_envs@_here_
  - ../examples/config/deepspeed_zero@_here_
  - ../examples/config/deepspeed_zero2@_here_
  - ../examples/config/deepspeed_zero3@_here_
  - ../examples/config/deepspeed_zero3_cpuoffload@_here_

hydra:
  run:
    dir: .
  output_subdir: null

exp_name: "qwen3_5_27B_agentic_sokoban"
seed: 42
logging_dir: ./output/logs
output_dir: ./output
render_save_dir: ./output/render

checkpoint_config:
  type: file_system
  output_dir: ./output/models/${exp_name}

track_with: tensorboard
tracker_kwargs:
  log_dir: ./output/tensorboard

num_gpus_per_node: 8

max_steps: 1024
save_steps: 200
logging_steps: 1
eval_steps: 10
resume_from_checkpoint: false

# Reduced batch size vs 3B model due to 27B model size
rollout_batch_size: 256
val_batch_size: 256
sequence_length: 8192

advantage_clip: 0.2
ppo_epochs: 1
adv_estimator: "grpo"
init_kl_coef: 0.0
whiten_advantages: true
entropy_loss_coef: 0
max_grad_norm: 1.0

pretrain: Qwen/Qwen3.5-27B

actor_train:
  model_args:
    flash_attn: sdpa
    attn_implementation: sdpa
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: ~
    freeze_module_prefix: vision_model
  training_args:
    learning_rate: 1.0e-6
    weight_decay: 1.0e-2
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 128
    warmup_steps: 5
    lr_scheduler_type: cosine
  strategy_args:
    strategy_name: megatron_train
    strategy_config:
      sequence_parallel: true
      recompute_granularity: selective
      tensor_model_parallel_size: 4
      pipeline_model_parallel_size: 2
      overlap_grad_reduce: true
      use_distributed_optimizer: true
      bf16: true
  device_mapping: list(range(0,32))
  infer_batch_size: 1

actor_infer:
  model_args:
    flash_attn: fa2
    attn_implementation: fa2
    disable_gradient_checkpointing: true
    dtype: bf16
  generating_args:
    max_new_tokens: 128  # single-turn response length (same as qwen2.5-vl sokoban)
    top_p: 0.99
    top_k: 100
    num_beams: 1
    temperature: 0.99
    num_return_sequences: 1
  strategy_args:
    strategy_name: vllm
    strategy_config:
      gpu_memory_utilization: 0.75
      block_size: 16
      max_model_len: 8192
      load_format: dummy
      tensor_parallel_size: 4
      optimization_level: 1
      sleep_level: 2
      # Multi-image support for multi-turn visual trajectory
      limit_mm_per_prompt:
        image: ${max_actions_per_traj}
  num_gpus_per_worker: 2
  device_mapping: list(range(0,32))
  infer_batch_size: 1

reference:
  model_args:
    flash_attn: sdpa
    attn_implementation: sdpa
    disable_gradient_checkpointing: true
    dtype: bf16
    model_type: ~
  strategy_args:
    strategy_name: megatron_infer
    strategy_config:
      tensor_model_parallel_size: 4
      bf16: true
  device_mapping: list(range(0,32))
  infer_batch_size: 4

reward_normalization:
  grouping: traj_group_id
  method: mean_std

train_env_manager:
  format_penalty: -0.15
  max_env_num_per_worker: 16
  num_env_groups: 32
  group_size: 8
  tags: [SimpleSokoban]
  num_groups_partition: [32]

val_env_manager:
  max_env_num_per_worker: 32
  num_env_groups: 256
  group_size: 1
  tags: [SimpleSokoban, LargerSokoban, SokobanDifferentGridVocab, FrozenLake]
  num_groups_partition: [64, 64, 64, 64]

max_tokens_per_step: 64

custom_envs:
  SimpleSokoban:
    ${custom_env.SimpleSokoban}
  LargerSokoban:
    ${custom_env.LargerSokoban}
  SokobanDifferentGridVocab:
    ${custom_env.SokobanDifferentGridVocab}
  FrozenLake:
    ${custom_env.FrozenLake}
  FrozenLakeThink:
    ${custom_env.FrozenLakeThink}
