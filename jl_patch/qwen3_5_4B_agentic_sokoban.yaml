defaults:
  - ../examples/config/vl_traj_envs@_here_
  - ../examples/config/deepspeed_zero@_here_
  - ../examples/config/deepspeed_zero2@_here_
  - ../examples/config/deepspeed_zero3@_here_
  - ../examples/config/deepspeed_zero3_cpuoffload@_here_

hydra:
  run:
    dir: .
  output_subdir: null

exp_name: "qwen3_5_4B_agentic_sokoban"
seed: 42
logging_dir: ./output/logs/${exp_name}
output_dir: ./output/${exp_name}
render_save_dir: ./output/render/${exp_name}

checkpoint_config:
  type: file_system
  output_dir: ../../ckpts/test_roll/${exp_name}

track_with: wandb
tracker_kwargs:
  project: qwen3_5_4B_agentic_sokoban

num_gpus_per_node: 8

chat_template_file: ../../models/Qwen/Qwen3.5-large-nodrop-thinking/chat_template.jinja

max_steps: 1024
save_steps: 10
logging_steps: 1
eval_steps: 10
resume_from_checkpoint: false

rollout_batch_size: 1024
val_batch_size: 512
sequence_length: 8192

enable_thinking: true
thinking_penalty: -0.2

advantage_clip: 0.2
ppo_epochs: 1
adv_estimator: "grpo"
init_kl_coef: 0.0
whiten_advantages: true
entropy_loss_coef: 0
max_grad_norm: 1.0

pretrain: /export/ssddata/junlong/models/Qwen/Qwen3.5-4B

actor_train:
  model_args:
    flash_attn: sdpa
    attn_implementation: sdpa
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: ~
  training_args:
    learning_rate: 1.0e-6
    weight_decay: 0
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 16
    warmup_steps: 10
    lr_scheduler_type: cosine
  strategy_args:
    strategy_name: megatron_train
    strategy_config:
      tensor_model_parallel_size: 1
      pipeline_model_parallel_size: 1
      expert_model_parallel_size: 1
      use_distributed_optimizer: true
      recompute_granularity: full
      bf16: true
  device_mapping: list(range(0,4))
  infer_batch_size: 2

actor_infer:
  model_args:
    disable_gradient_checkpointing: true
    dtype: bf16
  generating_args:
    max_new_tokens: 1024
    top_p: 0.99
    top_k: 100
    num_beams: 1
    temperature: 0.99
    num_return_sequences: 1
  strategy_args:
    strategy_name: vllm
    strategy_config:
      gpu_memory_utilization: 0.8
      block_size: 16
      load_format: auto
      enable_prefix_caching: false
      limit_mm_per_prompt:
        image: ${max_actions_per_traj}
  device_mapping: list(range(0,4))

reference:
  model_args:
    flash_attn: sdpa
    attn_implementation: sdpa
    disable_gradient_checkpointing: true
    dtype: bf16
    model_type: ~
  strategy_args:
    strategy_name: hf_infer
    strategy_config: ~
  device_mapping: list(range(0,4))
  infer_batch_size: 2

reward_normalization:
  grouping: traj_group_id
  method: mean_std

train_env_manager:
  format_penalty: -0.15
  max_env_num_per_worker: 128
  num_env_groups: 128
  group_size: 8
  tags: [SimpleSokoban]
  num_groups_partition: [128]

val_env_manager:
  max_env_num_per_worker: 256
  num_env_groups: 512
  group_size: 1
  tags: [SimpleSokoban, LargerSokoban, SokobanDifferentGridVocab, FrozenLake]
  num_groups_partition: [128, 128, 128, 128]

max_tokens_per_step: 1024

custom_envs:
  SimpleSokoban:
    ${custom_env.SimpleSokoban}
  LargerSokoban:
    ${custom_env.LargerSokoban}
  SokobanDifferentGridVocab:
    ${custom_env.SokobanDifferentGridVocab}
  FrozenLake:
    ${custom_env.FrozenLake}
  FrozenLakeThink:
    ${custom_env.FrozenLakeThink}
